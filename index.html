<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>مدونة التصميمات</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .hero {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    .gallery {
      padding: 20px;
    }

    .posts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
  background: white;
  color: #333;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  width: 250px;
  text-align: center;
  margin-top: 10px;
    }
    }

    .card img {
      max-width: 100%;
      border-radius: 10px;
    }
.upload-box {
  margin: 20px auto;
  padding: 20px;
  border: 2px dashed #2575fc;
  border-radius: 15px;
  text-align: center;
  background: #f7f9ff;
  max-width: 500px;
}

.upload-box input[type="file"] {
  margin: 10px 5px;
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

.upload-box input[type="number"] {
  margin: 10px 5px;
  padding: 8px;
  width: 120px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

.upload-box button {
  background: #2575fc;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.upload-box button:hover {
  background: #1e5fd9;
}

.previewArea {
  gap: 15px;
  margin-top: 20px;
  justify-content: center;
  }
    
    .btn:hover {
      background: #1a5edb;
    }
  </style>
</head>
<body>

<header>
  <h1>معرض التصميمات</h1>
</header>

<section class="hero">
  <h2>أحدث التصميمات الاحترافية</h2>
  <p>ألق بصرك </p> 
</section>

<div class="gallery">
 
      <div class="upload-box">
    <input type="file" id="fileUpload" accept="image/*">
    <button id="addBtn">إضافة للمعرض</button>
 
  <div class="posts" id="previewArea">

   <div class="card">
      <img src="https://via.placeholder.com/300" alt="تصميم 1">
      <h3>صور عادية</h3>
      <p>صور التصميم</p>
      <a href="#" class="btn">اقرأ المزيد</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="تصميم 2">
      <h3>لوجو احترافي</h3>
      <p>  صور وكتابة</p>
      <a href="#" class="btn">اقرأ المزيد</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="تصميم 3">
      <h3>بوستر إعلاني</h3>
      <p>تصميم تسويقي جذاب</p>
      <a href="#" class="btn">اقرأ المزيد</a>
    </div>
  </div>
</div>
<script 
const fileUpload = document.getElementById('fileUpload');
const imgWidth = document.getElementById('imgWidth');
const addBtn = document.getElementById('addBtn');
const posts = document.getElementById('previewArea');

addBtn.onclick = () => {
  const file = fileUpload.files[0];
  if (!file) {
    alert('اختر صورة أول');
    return;
  }
  const reader = new FileReader();

  reader.onload = () => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML += `
      <img src="${reader.result}" alt="صورة">
      <h3>تصميم جديد</h3>
      <p>تم الرفع للتو</p>
      <a href="#" class="btn">اقرأ المزيد</a>
    `;

    posts.appendChild(card);
    fileUpload.value = '';
  };

  reader.readAsDataURL(file);
};

  src="script.js"></script>
</body>
</html>
