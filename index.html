<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدونة التصميمات</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .hero {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    . gallery {
      padding: 20px;
    }

    .posts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      background: #2575fc;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: #1a5edb;
    }
  </style>
</head>
<body>

<header>
  <h1>معرض التصميمات</h1>
</header>

<section class="hero">
  <h2>أحدث التصميمات الاحترافية</h2>
  <p>ألق بصرك </p> 
</section>

<div class="gallery">
  <div class="posts">

    <div class="btn">
      <img src="https://via.placeholder.com/300" alt="تصميم 1">
      <h3>تصميم سوشيال ميديا</h3>
      <p>جاهز للنشر على إنستغرام</p>
      <a href="#" class="btn">اقرأ المزيد</a>
    </div>

    <div class="btn">
      <img src="https://via.placeholder.com/300" alt="تصميم 2">
      <h3>لوجو احترافي</h3>
      <p>تصميم شعار عصري</p>
      <a href="#" class="btn">اقرأ المزيد</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="تصميم 3">
      <h3>بوستر إعلاني</h3>
      <p>تصميم تسويقي جذاب</p>
      <a href="#" class="btn">اقرأ المزيد</a>
    </div>
  </div>
</div>
</body>
</html>
