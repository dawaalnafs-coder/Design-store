<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصتي - شبكة تواصل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=6.1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="light">

<div id="notification" class="notification hidden"></div>

<div id="authSection" class="auth-box card">
  <h2 style="text-align:center;margin-bottom:20px">مرحباً بك في منصتي 🤝</h2>
  <div class="tabs">
    <button id="loginTab" class="active" onclick="switchAuth('login')">دخول</button>
    <button id="registerTab" onclick="switchAuth('register')">تسجيل</button>
  </div>

  <div id="loginForm">
    <input type="email" id="loginEmail" placeholder="الإيميل">
    <input type="password" id="loginPassword" placeholder="كلمة المرور">
    <button class="btn-primary" onclick="handleLogin()">دخول</button>
  </div>

  <div id="registerForm" class="hidden">
    <input type="email" id="registerEmail" placeholder="الإيميل">
    <input type="text" id="registerUsername" placeholder="اسم المستخدم">
    <input type="password" id="registerPassword" placeholder="كلمة مرور قوية">
    <select id="registerGender">
      <option value="">اختر الجنس</option>
      <option value="M">ذكر</option>
      <option value="F">أنثى</option>
    </select>
    <button class="btn-primary" onclick="handleRegister()">إنشاء حساب</button>
  </div>
  <div id="authAlert" class="alert"></div>
</div>

<div id="mainSection" class="hidden">
  <div class="header">
    <h3>منصتي 🛒</h3>
    <div style="display:flex;align-items:center;gap:10px">
      <button id="themeBtn">🌙</button>
      <button id="notifBtn" onclick="showNotifications()">🔔<span id="notifCount" class="badge hidden">0</span></button>
      <button id="savedBtn" onclick="showSaved()">📌 المحفوظات</button>
      <span id="userEmail"></span>
      <button class="btn-danger" onclick="handleLogout()">خروج</button>
    </div>
  </div>

  <div class="container">
    <div class="card" id="postBox">
      <h4>📝 منشور جديد</h4>
      <input type="text" id="postTitle" placeholder="العنوان">
      <textarea id="postContent" placeholder="المحتوى..." rows="5" class="big-textarea"></textarea>

      <div style="display:flex;gap:10px;align-items:center;margin:10px 0">
        <input type="file" id="postImage" accept="image/*" style="display:none">
        <button type="button" onclick="document.getElementById('postImage').click()">📷 صورة</button>
        <span id="imageName" style="font-size:13px;color:#999"></span>
      </div>

      <button class="btn-primary" onclick="createPost()">نشر</button>
      <div id="postAlert" class="alert"></div>
    </div>

    <div class="card">
      <input type="text" id="searchInput" placeholder="🔍 ابحث عن منشور..." oninput="searchPosts()">
      <h4>📋 المنشورات</h4>
      <div id="postsList">جاري التحميل...</div>
    </div>

    <div class="card hidden" id="adminPanel">
      <h4>🔐 لوحة الإدارة</h4>
      <p>دي بتظهر للأدمن بس. تقدر تحذف أي منشور أو تعليق مخالف.</p>
    </div>
  </div>
</div>

<script>
const supabaseUrl = 'https://pbadwhwdodhwutuzjwuz.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk';
const db = supabase.createClient(supabaseUrl, supabaseKey);

let user = null;
let allPosts = [];
let allUsers = [];
const ADMIN_EMAIL = 'dawaahafs@gmail.com';
const EMOJIS = ['😂','❤️','👍','😮','😢','🔥','💯','🙏'];

function switchAuth(type) {
  document.getElementById('loginForm').classList.toggle('hidden', type!== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', type!== 'register');
  document.getElementById('loginTab').classList.toggle('active', type === 'login');
  document.getElementById('registerTab').classList.toggle('active', type === 'register');
}

function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.body.className = savedTheme;
  document.getElementById('themeBtn').textContent = savedTheme === 'dark'? '☀️' : '🌙';

  document.getElementById('themeBtn').onclick = () => {
    const newTheme = document.body.classList.contains('dark')? 'light' : 'dark';
    document.body.className = newTheme;
    localStorage.setItem('theme', newTheme);
    document.getElementById('themeBtn').textContent = newTheme === 'dark'? '☀️' : '🌙';
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showNotification(msg) {
  const n = document.getElementById('notification');
  n.textContent = msg;
  n.classList.remove('hidden');
  setTimeout(() => n.classList.add('hidden'), 3000);
}

async function handleRegister() {
  const email = document.getElementById('registerEmail').value.trim();
  const username = document.getElementById('registerUsername').value.trim();
  const password = document.getElementById('registerPassword').value;
  const gender = document.getElementById('registerGender').value;

  if(!email ||!password ||!username) return showAlert('authAlert', '❌ اكتب كل البيانات', 'error');
  if(!gender) return showAlert('authAlert', '❌ اختار الجنس', 'error');
  if(password.length < 6) return showAlert('authAlert', '❌ الباسوورد 6 حروف على الأقل', 'error');

  const { data, error } = await db.auth.signUp({ email, password });
  if(error) return showAlert('authAlert', '❌ ' + error.message, 'error');

  if(data.user) {
    // السطرين دول أهم حاجة - لازم نضيف في profiles
    const { error: profileError } = await db.from('profiles').insert({
      id: data.user.id,
      username: username,
      gender: gender,
      created_at: new Date(),
      last_seen: new Date()
    });

    if(profileError) {
      console.error('Profile error:', profileError);
      return showAlert('authAlert', '❌ خطأ في إنشاء البروفايل', 'error');
    }
  }

  showAlert('authAlert', '✅ تم التسجيل! تقدر تدخل دلوقتي', 'success');
  setTimeout(() => {
    document.getElementById('loginEmail').value = email;
    document.getElementById('loginPassword').value = password;
    switchAuth('login');
  }, 1000);
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if(!email ||!password) return showAlert('authAlert', '❌ اكتب الإيميل والباسوورد', 'error');

  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if(error) return showAlert('authAlert', '❌ ' + error.message, 'error');

  user = data.user;
  await db.from('profiles').update({last_seen: new Date()}).eq('id', user.id);
  await loadAllUsers();

  const { data: banned } = await db.from('banned_users').select('*').eq('user_id', user.id).single();
  if(banned) {
    await db.auth.signOut();
    user = null;
    return showAlert('authAlert', '🚫 حسابك محظور. السبب: ' + banned.reason, 'error');
  }
  showMain();
  loadPosts();
  subscribeRealtime();
  loadNotifications();
}

async function handleLogout() {
  if(user) await db.from('profiles').update({last_seen: new Date()}).eq('id', user.id);
  await db.auth.signOut();
  user = null;
  document.getElementById('authSection').classList.remove('hidden');
  document.getElementById('mainSection').classList.add('hidden');
}

function showMain() {
  document.getElementById('authSection').classList.add('hidden');
  document.getElementById('mainSection').classList.remove('hidden');
  document.getElementById('userEmail').textContent = user.email;
  initTheme();
  if(user.email === ADMIN_EMAIL) {
    document.getElementById('adminPanel').classList.remove('hidden');
  }
}

async function loadAllUsers() {
  const { data } = await db.from('profiles').select('id, username');
  allUsers = data || [];
}

async function createPost() {
  if(!user) return alert('سجل دخول الأول');
  const title = document.getElementById('postTitle').value.trim();
  const content = document.getElementById('postContent').value.trim();
  const imageFile = document.getElementById('postImage').files[0];

  if(!title ||!content) return showAlert('postAlert', '❌ اكتب عنوان ومحتوى', 'error');

  let imageUrl = null;
  if(imageFile) {
    const fileName = `${user.id}/${Date.now()}_${imageFile.name}`;
    const { data, error } = await db.storage.from('posts').upload(fileName, imageFile);
    if(!error) {
      const { data: urlData } = db.storage.from('posts').getPublicUrl(fileName);
      imageUrl = urlData.publicUrl;
    }
  }

  const { error } = await db.from('posts').insert({
    title, content, author: user.email, user_id: user.id, image_url: imageUrl, saved_by: []
  });
  if(error) return showAlert('postAlert', '❌ خطأ: ' + error.message, 'error');

  document.getElementById('postTitle').value = '';
  document.getElementById('postContent').value = '';
  document.getElementById('postImage').value = '';
  document.getElementById('imageName').textContent = '';
  showAlert('postAlert', '✅ تم النشر بنجاح', 'success');
  loadPosts();
}

async function getUserData(userId) {
  const { data } = await db.from('profiles').select('gender, username, last_seen').eq('id', userId).single();
  return data || {gender: 'M', username: `مستخدم_${userId.substring(0,6)}`, last_seen: null};
}

async function avatar(userId, lastSeen) {
  let userData = await getUserData(userId);
  let letter = userData.username[0].toUpperCase();
  let color = userData.gender === 'F'? 'var(--pink)' : 'var(--blue)';
  let online = lastSeen && (new Date() - new Date(lastSeen)) < 60000;
  return `<div class="avatar" style="background:${color}">${letter}${online? '<span class="online-dot"></span>' : ''}</div>`;
}

function timeAgo(date) {
  const now = new Date();
  const postDate = new Date(date);
  const diffMs = now.getTime() - postDate.getTime() - (2 * 60 * 60 * 1000);
  const seconds = Math.floor(diffMs / 1000);
  if(seconds < 60) return 'الآن';
  const minutes = Math.floor(seconds / 60);
  if(minutes < 60) return `منذ ${minutes} دقيقة`;
  const hours = Math.floor(minutes / 60);
  if(hours < 24) return `منذ ${hours} ساعة`;
  const days = Math.floor(hours / 24);
  if(days < 30) return `منذ ${days} يوم`;
  return postDate.toLocaleDateString('ar-EG');
}

function searchPosts() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allPosts.filter(p =>
    p.title.toLowerCase().includes(query) ||
    p.content.toLowerCase().includes(query)
  );
  renderPosts(filtered);
}

async function showSaved() {
  const saved = allPosts.filter(p => p.saved_by?.includes(user.id));
  renderPosts(saved);
  showNotification('📌 عرض المنشورات المحفوظة');
}

async function loadPosts() {
  if(!user) return;
  const { data } = await db.from('posts').select('*').order('created_at', { ascending: false });
  allPosts = data || [];
  renderPosts(allPosts);
}

async function renderPosts(data) {
  const list = document.getElementById('postsList');
  if(!data || data.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#999;padding:20px">لا توجد منشورات</div>';
    return;
  }

  list.innerHTML = '';
  for(let p of data) {
    let userData = await getUserData(p.user_id);
    let avatarHTML = await avatar(p.user_id, userData.last_seen);
    let isSaved = p.saved_by?.includes(user.id);

    const postEl = document.createElement('div');
    postEl.className = 'post-item';
    postEl.innerHTML = `
      <div class="post-title">${escapeHtml(p.title)}</div>
      <div class="post-meta">${avatarHTML} <b>${userData.username}</b> | ${timeAgo(p.created_at)}</div>
      <div class="post-content">${parseMentions(escapeHtml(p.content))}</div>
      ${p.image_url? `<img src="${p.image_url}" class="post-image">` : ''}
      <div class="post-actions">
        ${user.email === ADMIN_EMAIL || user.id === p.user_id?
          `<button class="btn-danger" onclick="deletePost(${p.id})">🗑️ حذف</button>` : ''}
        ${user.email!== ADMIN_EMAIL?
          `<button class="btn-warn" onclick="reportPost(${p.id})">🚩 إبلاغ</button>` : ''}
        <button class="btn-like" onclick="toggleLike(${p.id})" id="like-${p.id}">❤️ 0</button>
        <button class="btn-comment" onclick="toggleComments(${p.id})">💬 تعليقات</button>
        <button class="btn-save ${isSaved? 'saved' : ''}" onclick="toggleSave(${p.id})">${isSaved? '📌 محفوظ' : '📌 حفظ'}</button>
      </div>
      <div id="comments-${p.id}" class="comments-box hidden">
        <div class="emoji-box hidden" id="emoji-${p.id}"></div>
        <div class="whatsapp-input">
          <button onclick="toggleEmoji(${p.id})">😀</button>
          <textarea id="input-${p.id}" placeholder="اكتب تعليق... @للمنشن" rows="1" class="comment-field" onkeyup="checkMention(event, ${p.id})"></textarea>
          <button onclick="addComment(${p.id}, null)">ᯓ➤</button>
        </div>
        <div id="mention-${p.id}" class="mention-box hidden"></div>
        <div id="list-${p.id}" class="comments-list"></div>
      </div>
    `;
    list.appendChild(postEl);
    loadLikes(p.id);
    loadEmojis(p.id);
  }
}

function loadEmojis(postId) {
  const box = document.getElementById(`emoji-${postId}`);
  box.innerHTML = EMOJIS.map(e => `<span onclick="addEmoji(${postId}, '${e}')">${e}</span>`).join('');
}

function toggleEmoji(postId) {
  document.getElementById(`emoji-${postId}`).classList.toggle('hidden');
}

function addEmoji(postId, emoji) {
  const input = document.getElementById(`input-${postId}`);
  input.value += emoji;
  input.focus();
}

function checkMention(e, postId) {
  const input = e.target;
  const text = input.value;
  const lastAt = text.lastIndexOf('@');

  if(lastAt!== -1 && e.key!== ' ') {
    const search = text.substring(lastAt + 1).toLowerCase();
    const matches = allUsers.filter(u => u.username.toLowerCase().includes(search)).slice(0, 5);

    const box = document.getElementById(`mention-${postId}`);
    if(matches.length > 0) {
      box.innerHTML = matches.map(u =>
        `<div onclick="selectMention(${postId}, ${lastAt}, '${u.username}')">@${u.username}</div>`
      ).join('');
      box.classList.remove('hidden');
    } else {
      box.classList.add('hidden');
    }
  } else {
    document.getElementById(`mention-${postId}`).classList.add('hidden');
  }
}

function selectMention(postId, pos, username) {
  const input = document.getElementById(`input-${postId}`);
  const text = input.value;
  input.value = text.substring(0, pos) + `@${username} ` + text.substring(pos + username.length + 1);
  document.getElementById(`mention-${postId}`).classList.add('hidden');
  input.focus();
}

function parseMentions(text) {
  return text.replace(/@(\w+)/g, '<span class="mention">@$1</span>');
}

async function toggleSave(postId) {
  const post = allPosts.find(p => p.id === postId);
  let savedBy = post.saved_by || [];

  if(savedBy.includes(user.id)) {
    savedBy = savedBy.filter(id => id!== user.id);
  } else {
    savedBy.push(user.id);
    showNotification('📌 تم حفظ المنشور');
  }

  await db.from('posts').update({saved_by: savedBy}).eq('id', postId);
  loadPosts();
}

async function deletePost(id) {
  if(!confirm('متأكد عايز تحذف المنشور؟')) return;
  await db.from('posts').delete().eq('id', id);
  await db.from('reports').delete().eq('post_id', id);
  await db.from('comments').delete().eq('post_id', id);
  loadPosts();
}

async function reportPost(id) {
  if(!user) return;
  const { error } = await db.from('reports').insert({ post_id: id, reporter_id: user.id });
  if(error) return alert('أبلغت عنه قبل كده');
  alert('✅ تم الإبلاغ. الأدمن هيراجع');
}

async function toggleLike(postId) {
  if(!user) return alert('سجل دخول الأول');
  const post = allPosts.find(p => p.id === postId);
  const { data: existing } = await db.from('likes').select('*').eq('post_id', postId).eq('user_id', user.id).single();

  if(existing) {
    await db.from('likes').delete().eq('id', existing.id);
  } else {
    await db.from('likes').insert({post_id: postId, user_id: user.id});
    showNotification('❤️ تم اللايك');

    // إشعار اللايك
    if(post.user_id!== user.id) {
      await db.from('notifications').insert({
        user_id: post.user_id,
        type: 'like',
        post_id: postId,
        from_user: user.id,
        content: '',
        read: false
      });
    }
  }
  loadLikes(postId);
}

async function loadLikes(postId) {
  const { count } = await db.from('likes').select('*', {count:'exact'}).eq('post_id', postId);
  const btn = document.getElementById(`like-${postId}`);
  if(btn) btn.innerHTML = `❤️ ${count || 0}`;
}

function toggleComments(postId) {
  const div = document.getElementById(`comments-${postId}`);
  div.classList.toggle('hidden');
  if(!div.classList.contains('hidden')) loadComments(postId);
}

async function addComment(postId, parentId) {
  if(!user) return alert('سجل دخول الأول');
  const inputId = parentId? `reply-${parentId}` : `input-${postId}`;
  const input = document.getElementById(inputId);
  const commentText = input.value.trim();
  if(!commentText) return alert('اكتب تعليق الأول');

  const { data: newComment, error } = await db.from('comments').insert({
    post_id: postId,
    content: commentText,
    user_id: user.id,
    parent_id: parentId
  }).select().single();

  if(error) {
    alert('خطأ: ' + error.message);
  } else {
    input.value = '';
    input.style.height = 'auto';
    if(parentId) document.getElementById(`reply-box-${parentId}`)?.remove();

    // إشعار للرد
    if(parentId) {
      const { data: parent } = await db.from('comments').select('user_id').eq('id', parentId).single();
      if(parent && parent.user_id!== user.id) {
        await db.from('notifications').insert({
          user_id: parent.user_id,
          type: 'reply',
          post_id: postId,
          comment_id: parentId,
          from_user: user.id,
          content: commentText.substring(0, 30) + '...',
          read: false
        });
      }
    }

    loadComments(postId);
    showNotification(parentId? '💬 تم الرد' : '💬 تم التعليق');
  }
}

function showReplyBox(commentId, btn) {
  const existing = document.getElementById(`reply-box-${commentId}`);
  if(existing) {
    existing.remove();
    btn.textContent = 'رد';
    return;
  }

  document.querySelectorAll('[id^="reply-box-"]').forEach(el => el.remove());
  document.querySelectorAll('.reply-btn').forEach(b => b.textContent = 'رد');

  btn.textContent = 'إلغاء';

  const postId = btn.closest('.post-item').querySelector('[id^="comments-"]').id.replace('comments-', '');

  const html = `
    <div id="reply-box-${commentId}" class="whatsapp-input" style="margin-top:8px;margin-right:50px">
      <button onclick="toggleEmojiReply(${commentId})">😀</button>
      <textarea id="reply-${commentId}" placeholder="اكتب ردك... @للمنشن" rows="1" class="comment-field" onkeyup="checkMention(event, ${postId})"></textarea>
      <button onclick="addComment(${postId}, ${commentId})">ᯓ➤</button>
    </div>
    <div id="emoji-reply-${commentId}" class="emoji-box hidden"></div>
  `;
  document.getElementById(`comment-${commentId}`).insertAdjacentHTML('afterend', html);
  document.getElementById(`reply-${commentId}`).focus();
  loadEmojisReply(commentId);
}

function loadEmojisReply(commentId) {
  const box = document.getElementById(`emoji-reply-${commentId}`);
  box.innerHTML = EMOJIS.map(e => `<span onclick="addEmojiReply(${commentId}, '${e}')">${e}</span>`).join('');
}

function toggleEmojiReply(commentId) {
  document.getElementById(`emoji-reply-${commentId}`).classList.toggle('hidden');
}

function addEmojiReply(commentId, emoji) {
  const input = document.getElementById(`reply-${commentId}`);
  input.value += emoji;
  input.focus();
}

async function editComment(commentId) {
  const newText = prompt('عدل تعليقك:');
  if(newText && newText.trim()) {
    await db.from('comments').update({content: newText.trim()}).eq('id', commentId);
    const postId = document.querySelector(`#comment-${commentId}`).closest('[id^="comments-"]').id.replace('comments-', '');
    loadComments(postId);
    showNotification('✏️ تم التعديل');
  }
}

async function deleteComment(commentId, postId) {
  if(!confirm('متأكد عايز تحذف التعليق؟')) return;
  await db.from('comments').delete().eq('id', commentId);
  loadComments(postId);
}

async function loadComments(postId) {
  const list = document.getElementById(`list-${postId}`);
  list.innerHTML = '<small style="color:#999">جاري التحميل...</small>';

  const { data, error } = await db.from('comments')
.select('id, content, created_at, user_id, parent_id, profiles(username, gender, last_seen)')
.eq('post_id', postId)
.order('created_at', { ascending: true });

  if(error) {
    list.innerHTML = '<small style="color:red">فشل التحميل</small>';
    return;
  }

  if(!data || data.length === 0) {
    list.innerHTML = '<small style="color:#999">لا توجد تعليقات بعد</small>';
    return;
  }

  list.innerHTML = '';
  const comments = data.filter(c =>!c.parent_id);

  for(let c of comments) {
    let userData = c.profiles || {username: `مستخدم_${c.user_id.substring(0,6)}`, gender: 'M', last_seen: null};
    let avatarHTML = await avatar(c.user_id, userData.last_seen);
    let deleteBtn = (user.email === ADMIN_EMAIL || user.id === c.user_id)
 ? `<button class="btn-danger small" onclick="deleteComment(${c.id}, ${postId})">🗑️</button>` : '';
    let editBtn = (user.id === c.user_id)
 ? `<button class="btn-comment small" onclick="editComment(${c.id})">✏️</button>` : '';

    let replies = data.filter(r => r.parent_id === c.id);
    let repliesHTML = '';
    for(let r of replies) {
      let rUser = r.profiles || {username: `مستخدم_${r.user_id.substring(0,6)}`, gender: 'M', last_seen: null};
      let rAvatar = await avatar(r.user_id, rUser.last_seen);
      let rDeleteBtn = (user.email === ADMIN_EMAIL || user.id === r.user_id)
   ? `<button class="btn-danger small" onclick="deleteComment(${r.id}, ${postId})">🗑️</button>` : '';
      let rEditBtn = (user.id === r.user_id)
   ? `<button class="btn-comment small" onclick="editComment(${r.id})">✏️</button>` : '';

      repliesHTML += `
        <div class="comment-item reply" id="comment-${r.id}">
          ${rAvatar}
          <div class="comment-body">
            <div class="comment-head">
              <b>${rUser.username}</b>
              <div style="display:flex;gap:5px">
                ${rEditBtn}
                ${rDeleteBtn}
              </div>
            </div>
            <div class="comment-text">${parseMentions(escapeHtml(r.content))}</div>
            <span class="time-ago">${timeAgo(r.created_at)}</span>
          </div>
        </div>
      `;
    }

    const commentEl = document.createElement('div');
    commentEl.id = `comment-${c.id}`;
    commentEl.className = 'comment-item';
    commentEl.innerHTML = `
      ${avatarHTML}
      <div class="comment-body">
        <div class="comment-head">
          <b>${userData.username}</b>
          <div style="display:flex;gap:5px">
            <button class="btn-comment small reply-btn" onclick="showReplyBox(${c.id}, this)">رد</button>
            ${editBtn}
            ${deleteBtn}
          </div>
        </div>
        <div class="comment-text">${parseMentions(escapeHtml(c.content))}</div>
        <span class="time-ago">${timeAgo(c.created_at)}</span>
        ${repliesHTML}
      </div>
    `;
    list.appendChild(commentEl);
  }
}

// نظام الإشعارات
async function loadNotifications() {
  if(!user) return;
  const { count } = await db.from('notifications')
 .select('*', {count: 'exact'})
 .eq('user_id', user.id)
 .eq('read', false);

  const badge = document.getElementById('notifCount');
  if(count > 0) {
    badge.textContent = count;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

async function showNotifications() {
  const { data } = await db.from('notifications')
 .select('*, profiles!from_user(username)')
 .eq('user_id', user.id)
 .order('created_at', {ascending: false})
 .limit(15);

  if(!data || data.length === 0) {
    alert('لا توجد إشعارات');
    return;
  }

  let msg = '🔔 الإشعارات:\n\n';
  data.forEach(n => {
    const from = n.profiles?.username || 'مستخدم';
    if(n.type === 'like') msg += `❤️ ${from}: عمل لايك على منشورك\n`;
    if(n.type === 'reply') msg += `💬 ${from}: رد عليك "${n.content}"\n`;
  });
  alert(msg);

  await db.from('notifications').update({read: true}).eq('user_id', user.id);
  loadNotifications();
}

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}

document.addEventListener('input', e => {
  if(e.target.matches('.comment-field')) {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  }
});

document.addEventListener('change', e => {
  if(e.target.id === 'postImage') {
    document.getElementById('imageName').textContent = e.target.files[0]?.name || '';
  }
});

function subscribeRealtime() {
  db.channel('posts').on('postgres_changes', {event: 'INSERT', schema: 'public', table: 'posts'},
    () => loadPosts()
  ).subscribe();

  db.channel('notifications').on('postgres_changes', {event: 'INSERT', schema: 'public', table: 'notifications', filter: `user_id=eq.${user.id}`},
    () => loadNotifications()
  ).subscribe();
}

setInterval(() => {
  if(user) db.from('profiles').update({last_seen: new Date()}).eq('id', user.id);
}, 60000);

window.addEventListener('load', async () => {
  const { data } = await db.auth.getSession();
  if(data.session) {
    user = data.session.user;
    const { data: banned } = await db.from('banned_users').select('*').eq('user_id', user.id).single();
    if(banned) {
      await db.auth.signOut();
      return;
    }
    showMain();
    loadPosts();
    subscribeRealtime();
    loadNotifications();
  }
});
</script>
