<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>متجر التصميمات</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .hero {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: #2575fc;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #1a5edb;
    }

    .cart {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #111;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>متجر التصميمات</h1>
</header>

<section class="hero">
  <h2>أحدث التصميمات الاحترافية</h2>
  <p>اشترِ تصاميم جاهزة لمشاريعك أو تسويقك</p>
</section>

<div class="container">
  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="تصميم 1">
      <h3>تصميم سوشيال ميديا</h3>
      <p>جاهز للنشر على إنستغرام</p>
      <button onclick="addToCart()">أضف للسلة</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="تصميم 2">
      <h3>لوجو احترافي</h3>
      <p>تصميم شعار عصري</p>
      <button onclick="addToCart()">أضف للسلة</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="تصميم 3">
      <h3>بوستر إعلاني</h3>
      <p>تصميم تسويقي جذاب</p>
      <button onclick="addToCart()">أضف للسلة</button>
    </div>

  </div>
</div>

<div class="cart" id="cart">
  السلة: 0
</div>

<script>
  let count = 0;

  function addToCart() {
    count++;
    document.getElementById('cart').innerText = 'السلة: ' + count;
  }
</script>

</body>
</html>
