<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مدونتي</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:tahoma;background:#111;color:#eee;padding:20px}
    input,textarea,button{width:100%;padding:8px;margin:5px 0}
    #posts div{border:1px solid #444;padding:10px;margin:10px 0;border-radius:8px}
  </style>
</head>
<body>
  <h1>لوحة التحكم</h1>
  
  <form id="postForm">
    <input type="text" id="title" placeholder="العنوان" required>
    <textarea id="content" placeholder="المحتوى" required></textarea>
    <button type="submit">نشر</button>
  </form>

  <h2>البوستات</h2>
  <div id="posts">جاري التحميل...</div>

  <script>
    // ===== حط بياناتك هنا =====
    const supabaseUrl = 'https://xxxxx.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6...'
    const supabase = supabase.createClient(supabaseUrl, supabaseKey)
    // ==========================

    async function loadPosts(){
      const postsDiv = document.getElementById('posts')
      try{
        const { data, error } = await supabase.from('posts').select('*').order('created_at', {ascending:false})
        if(error) throw error
        
        if(!data || data.length === 0){
          postsDiv.innerHTML = 'مفيش بوستات لسه. ضيف أول بوست'
          return
        }
        
        postsDiv.innerHTML = data.map(p => `
          <div>
            <h3>${p.title}</h3>
            <p>${p.content}</p>
            <small>${new Date(p.created_at).toLocaleDateString('ar-EG')}</small>
          </div>
        `).join('')
      }catch(err){
        postsDiv.innerHTML = 'خطأ: ' + err.message
      }
    }

    document.getElementById('postForm').addEventListener('submit', async (e)=>{
      e.preventDefault()
      const title = document.getElementById('title').value
      const content = document.getElementById('content').value
      await supabase.from('posts').insert([{title, content, published:true}])
      document.getElementById('postForm').reset()
      loadPosts()
    })

    loadPosts()
  </script>
</body>
</html>
