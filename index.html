<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مدونتي</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:tahoma;background:#111;color:#eee;padding:20px;max-width:600px;margin:auto}
    input,textarea,button{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:none}
    button{background:#0d6efd;color:white;cursor:pointer}
    #posts div{border:1px solid #444;padding:12px;margin:10px 0;border-radius:8px;background:#1a1a1a}
  </style>
</head>
<body>
  <h1>لوحة التحكم</h1>
  
  <form id="postForm">
    <input type="text" id="title" placeholder="العنوان" required>
    <textarea id="content" placeholder="المحتوى" rows="4" required></textarea>
    <button type="submit">نشر</button>
  </form>

  <h2>البوستات</h2>
  <div id="posts">جاري التحميل...</div>

  <script>
    // ===== انسخ اللينكين بتوعك هنا بالظبط =====
    const supabaseUrl = 'https://pbadwhwdodhwutuzjwuz.supabase.co'
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk'
    const db = supabase.createClient(supabaseUrl, supabaseKey)
    // ===========================================

    async function loadPosts(){
      const postsDiv = document.getElementById('posts')
      try{
        const { data, error } = await db.from('posts').select('*').order('created_at', {ascending:false})
        if(error) throw error
        
        if(!data || data.length === 0){
          postsDiv.innerHTML = 'مفيش بوستات لسه. ضيف أول بوست 👇'
          return
        }
        
        postsDiv.innerHTML = data.map(p => `
          <div>
            <h3>${p.title}</h3>
            <p>${p.content}</p>
            <small style="color:#aaa">${new Date(p.created_at).toLocaleDateString('ar-EG')}</small>
          </div>
        `).join('')
      }catch(err){
        postsDiv.innerHTML = 'خطأ: ' + err.message + '<br>اتأكد من اللينك والمفتاح'
        console.error(err)
      }
    }

    document.getElementById('postForm').addEventListener('submit', async (e)=>{
      e.preventDefault()
      const title = document.getElementById('title').value
      const content = document.getElementById('content').value
      await db.from('posts').insert([{title, content, published:true}])
      document.getElementById('postForm').reset()
      loadPosts()
    })

    loadPosts()
  </script>
</body>
</html>
