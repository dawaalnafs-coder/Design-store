<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدونتي</title>
<style>
  body { font-family: 'Tahoma', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
  .container { max-width: 700px; margin: auto; }
  h1 { text-align: center; color: #333; }
  .post { 
    background: white; 
    padding: 20px; 
    margin: 15px 0; 
    border-radius: 12px; 
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }
  .post:hover { transform: translateY(-3px); }
  .post h2 { margin-top: 0; color: #2c3e50; }
  .post p { color: #555; line-height: 1.8; }
  .date { font-size: 12px; color: #999; margin-top: 10px; }
  .loading { text-align: center; padding: 40px; color: #666; }
</style>
</head>
<body>
<div class="container">
  <h1>📝 مدونتي</h1>
  <div id="posts" class="loading">جاري تحميل المنشورات...</div>
</div>

<script>
const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gHL7g2NhmwdOV7bm7iK9eA_yM5LCqfc';

async function loadPosts() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts?published=eq.true&order=created_at.desc`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    
    const posts = await res.json();
    const container = document.getElementById('posts');
    
    if(posts.length === 0) {
      container.innerHTML = '<div class="loading">لا توجد منشورات بعد. انشر أول منشور من لوحة التحكم</div>';
      return;
    }
    
    container.innerHTML = posts.map(p => `
      <div class="post">
        <h2>${p.title}</h2>
        <p>${p.description}</p>
        ${p.image_url ? `<img src="${p.image_url}" style="max-width:100%; border-radius:8px; margin-top:10px">` : ''}
        <div class="date">نُشر في: ${new Date(p.created_at).toLocaleDateString('ar-SA')}</div>
      </div>
    `).join('');
    
  } catch(e) {
    document.getElementById('posts').innerHTML = '❌ خطأ في تحميل المنشورات';
    console.error(e);
  }
}

loadPosts();
</script>
</body>
</html>
