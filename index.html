<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدونتي</title>
<style>
  body { font-family: 'Tahoma', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
  .container { max-width: 700px; margin: auto; }
  h1 { text-align: center; color: #333; margin-bottom: 30px; }
  .post { 
    background: white; 
    padding: 25px; 
    margin: 20px 0; 
    border-radius: 15px; 
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    transition: transform 0.2s;
  }
  .post:hover { transform: translateY(-4px); box-shadow: 0 5px 15px rgba(0,0,0,0.12); }
  .post h2 { margin-top: 0; color: #2c3e50; font-size: 24px; }
  .post p { color: #555; line-height: 1.8; font-size: 16px; }
  .post img { max-width: 100%; border-radius: 10px; margin-top: 15px; }
  .date { font-size: 13px; color: #999; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
  .loading { text-align: center; padding: 60px; color: #666; font-size: 18px; }
  .empty { text-align: center; padding: 60px; color: #999; }
</style>
</head>
<body>
    <div id="posts-container" class="loading">جاري تحميل المنشورات...</div>
<div class="container">
  <h1>📝 مدونتي</h1>
  
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // حط بيانات مشروعك هنا
  const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk';

  const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadPosts() {
    const container = document.getElementById('posts-container');
    
    try {
      // نجيب المنشورات المنشورة فقط ونرتبها من الأحدث
      const { data, error } = await client
        .from('posts')
        .select('id, title, description, image_url, created_at, published')
        .eq('published', true)
        .order('created_at', { ascending: false });

      if(error) {
        container.innerHTML = '<div style="text-align:center; padding:40px; color:red">خطأ: ' + error.message + '</div>';
        console.log('خطأ Supabase:', error);
        return;
      }
      
      if(!data || data.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:60px; color:#666">لا توجد مقالات منشورة بعد 📝</div>';
        return;
      }
      
      // نبني كروت المقالات
      container.className = '';
      container.innerHTML = data.map(post => `
        <div class="post">
          <h2>${post.title}</h2>
          <p style="line-height:1.8; color:#444; margin:15px 0">${post.description || ''}</p>
          ${post.image_url ? `<img src="${post.image_url}" style="max-width:100%; border-radius:12px; margin-top:15px" alt="${post.title}">` : ''}
          <div class="date" style="margin-top:15px; font-size:13px; color:#888">
            ${new Date(post.created_at).toLocaleDateString('ar-EG', {year:'numeric', month:'long', day:'numeric'})}
          </div>
        </div>
      `).join('');
      
    } catch(err) {
      container.innerHTML = '<div style="text-align:center; padding:40px; color:red">حدث خطأ غير متوقع</div>';
      console.log('خطأ:', err);
    }
  }

  // شغل الدالة اول ما الصفحة تحمل
  loadPosts();
</script>
</body>
</html>
