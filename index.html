<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدونتي</title>
<style>
  body { font-family: 'Tahoma', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
  .container { max-width: 700px; margin: auto; }
  h1 { text-align: center; color: #333; margin-bottom: 30px; }
  .post { 
    background: white; 
    padding: 25px; 
    margin: 20px 0; 
    border-radius: 15px; 
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    transition: transform 0.2s;
  }
  .post:hover { transform: translateY(-4px); box-shadow: 0 5px 15px rgba(0,0,0,0.12); }
  .post h2 { margin-top: 0; color: #2c3e50; font-size: 24px; }
  .post p { color: #555; line-height: 1.8; font-size: 16px; }
  .post img { max-width: 100%; border-radius: 10px; margin-top: 15px; }
  .date { font-size: 13px; color: #999; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
  .loading { text-align: center; padding: 60px; color: #666; font-size: 18px; }
  .empty { text-align: center; padding: 60px; color: #999; }
</style>
</head>
<body>
<div class="container">
  <h1>📝 مدونتي</h1>
  <div id="posts" class="loading">جاري تحميل المنشورات...</div>
</div>

<script>
const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gHL7g2NhmwdOV7bm7iK9eA_yM5LCqfc';

async function loadPosts() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/posts?order=created_at.desc`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    
    if(!res.ok) throw new Error('فشل التحميل');
    
    const posts = await res.json();
    const container = document.getElementById('posts');
    
    if(posts.length === 0) {
      container.innerHTML = '<div class="empty">لا توجد منشورات بعد<br>انشر أول منشور من لوحة التحكم</div>';
      return;
    }
    
    container.innerHTML = posts.map(p => `
      <div class="post">
        <h2>${p.title || 'بدون عنوان'}</h2>
        <p>${p.description || ''}</p>
        ${p.image_url ? `<img src="${p.image_url}" alt="${p.title}">` : ''}
        <div class="date">نُشر في: ${new Date(p.created_at).toLocaleDateString('ar-SA', {year: 'numeric', month: 'long', day: 'numeric'})}</div>
      </div>
    `).join('');
    
  } catch(e) {
    document.getElementById('posts').innerHTML = '❌ خطأ في تحميل المنشورات<br><small>تأكد من سياسات Supabase</small>';
    console.error(e);
  }
}

loadPosts();
</script>
</body>
</html>
