<pre id="result" style="background:#f4f4f4;padding:20px;border-radius:8px"></pre>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk'

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
const result = document.getElementById('result')

async function test() {
  result.textContent = 'جاري الاختبار...'

  // اختبار 1: الاتصال
  result.textContent += '\n\n1. بختبر الاتصال بـ Supabase...'
  const {data, error} = await supabase.from('posts').select('id,title').limit(1)

  if(error) {
    result.textContent += '\n❌ خطأ: ' + error.message
    result.textContent += '\nالكود: ' + error.code
    return
  }

  result.textContent += '\n✅ الاتصال ناجح!'
  result.textContent += '\nعدد المنشورات اللي رجعت: ' + data.length

  if(data.length > 0) {
    result.textContent += '\nأول منشور: ' + data[0].title
  } else {
    result.textContent += '\n⚠️ الجدول فاضي. اعمل منشور من admin.html الأول'
  }
}

test()
</script>
</body>
