<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تجربة</title>
<style>
body{background:#111;color:#0f0;font-family:monospace;text-align:center;padding:80px}
input{padding:15px;font-size:18px;width:250px;background:#222;color:#0f0;border:2px solid #0f0}
button{padding:15px 30px;font-size:18px;background:#0f0;color:#111;border:none;margin-top:15px;font-weight:bold;cursor:pointer}
#ok{display:none;font-size:22px;margin-top:30px}
</style>
</head>
<body>
<h2>النتيجة:</h2>
<input type="password" id="p" placeholder="mysecret1999">
<br>
<button onclick="go()">دخول</button>
<div id="ok">✅ نجح! الباسورد شغال</div>

<script>
function go(){
  let val = document.getElementById('p').value;
  if(val === 'mysecret1999'){
    document.getElementById('ok').style.display = 'block';
  } else {
    alert('❌ خطأ شبكة: كلمة السر غلط');
  }
}
</script>
</body>
</html>
