<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تجربة الباسورد</title>
<style>
body{text-align:center;padding:100px;font-family:sans-serif}
input{padding:15px;font-size:18px;width:250px}
button{padding:15px 30px;font-size:18px;background:#27ae60;color:white;border:none;border-radius:8px}
#ok{display:none;color:green;font-size:24px;margin-top:30px}
</style>
</head>
<body>
<h1>تجربة كلمة السر</h1>
<input type="password" id="p" placeholder="اكتب الباسورد">
<br><br>
<button onclick="go()">دخول</button>
<div id="ok">✅ الباسورد صح واشتغل!</div>

<script>
function go(){
  if(document.getElementById('p').value === 'mysecret1999'){
    document.getElementById('ok').style.display = 'block';
  } else {
    alert('غلط جرب تاني');
  }
}
</script>
</body>
</html>
