<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>
<style>
body{font-family:tahoma;padding:20px;background:#f5f5f5}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
button{background:#7c3aed;color:white;border:none;padding:12px 20px;border-radius:8px;cursor:pointer}
button:hover{background:#6d28d9}
.container{max-width:500px;margin:auto;background:white;padding:20px;border-radius:12px}
</style>
</head>
<body>
<div class="container">
<h2>إضافة منشور جديد</h2>
<input type="text" id="title" placeholder="عنوان المنشور">
<input type="text" id="image" placeholder="رابط الصورة المباشر">
<textarea id="desc" placeholder="وصف المنشور" rows="4"></textarea>
<button onclick="addPost()">حفظ في الموقع</button>
<p id="msg"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co'
const SUPABASE_KEY = 'sb_publishable_MRspQIqKOrUDJF_HxKHnoQ_J3Sfvz1w'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function addPost(){
  const title = document.getElementById('title').value
  const image_url = document.getElementById('image').value
  const description = document.getElementById('desc').value
  
  if(!title || !image_url){
    document.getElementById('msg').innerText = 'اكتب العنوان ورابط الصورة'
    return
  }
  
  const { error } = await supabase.from('posts').insert([{title, image_url, description}])
  
  if(error){
    document.getElementById('msg').innerText = 'خطأ: ' + error.message
  } else {
    document.getElementById('msg').innerText = 'تم الحفظ! ارجع للموقع وحدث الصفحة'
    document.getElementById('title').value = ''
    document.getElementById('image').value = ''
    document.getElementById('desc').value = ''
  }
}
</script>
</body>
</html>
