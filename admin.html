<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:'Tajawal',sans-serif;background:#f5f7fa;margin:0;padding:20px}
.container{max-width:900px;margin:0 auto;background:white;padding:30px;border-radius:12px}
h1{text-align:center;color:#2c3e50}
input,textarea{width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:8px;font-size:16px}
button{background:#3498db;color:white;border:none;padding:14px 25px;border-radius:8px;cursor:pointer;font-size:16px;font-weight:bold}
table{width:100%;border-collapse:collapse;margin-top:30px}
th,td{padding:12px;text-align:right;border-bottom:1px solid #ddd}
th{background:#3498db;color:white}
#loginBox{text-align:center;padding:80px 20px}
#loginBox input{width:250px}
</style>
</head>
<body>

<div id="loginBox">
<h1>🔐 لوحة تحكم المدونة</h1>
<p>ادخل كلمة السر للمتابعة</p>
<input type="password" id="passInput" placeholder="كلمة السر">
<br><br>
<button onclick="checkPass()">دخول</button>
<p id="errorMsg" style="color:red;display:none">كلمة السر خاطئة!</p>
</div>

<div id="adminPanel" style="display:none">
<div class="container">
<h1>📝 إدارة البوستات</h1>
<form id="postForm">
<h3 id="formTitle">إضافة بوست جديد</h3>
<input type="hidden" id="postId">
<input type="text" id="title" placeholder="عنوان البوست" required>
<textarea id="content" placeholder="محتوى البوست" required></textarea>
<label>📸 صورة الغلاف:</label>
<input type="file" id="imageFile" accept="image/*">
<img id="imagePreview" style="max-width:120px;display:none;margin-top:10px;border-radius:8px">
<input type="hidden" id="imageUrl">
<br><label><input type="checkbox" id="published"> نشر البوست الآن</label>
<br><br>
<button type="submit">💾 حفظ البوست</button>
<button type="button" onclick="resetForm()">➕ بوست جديد</button>
</form>

<h3 style="margin-top:50px">📋 كل البوستات</h3>
<table style="width:100%;border-collapse:collapse">
<thead><tr><th style="background:#3498db;color:white;padding:12px">العنوان</th><th style="background:#3498db;color:white;padding:12px">الحالة</th><th style="background:#3498db;color:white;padding:12px">إجراءات</th></tr></thead>
<tbody id="postsTable"><tr><td colspan="3" style="text-align:center;padding:20px">جاري التحميل...</td></tr></tbody>
</table>
</div></div>
<script>
const PASSWORD = 'mysecret1999';
const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function checkPass() {
    let pass = document.getElementById('passInput').value;
    if(pass === PASSWORD) {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadPosts();
    } else {
        document.getElementById('errorMsg').style.display = 'block';
    }
}

async function loadPosts() {
    const {data} = await supabase.from('posts').select('*').order('created_at', {ascending:false});
    const tbody = document.getElementById('postsTable');
    if(!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px">لا توجد بوستات بعد</td></tr>';
        return;
    }
    tbody.innerHTML = data.map(p => `
        <tr>
            <td style="padding:12px;border-bottom:1px solid #ddd">${p.title}</td>
            <td style="padding:12px;border-bottom:1px solid #ddd">${p.published? '✅ منشور' : '📝 مسودة'}</td>
            <td style="padding:12px;border-bottom:1px solid #ddd"><button onclick="alert('عدل الـ URL والـ KEY الأول')">تعديل</button></td>
        </tr>
    `).join('');
}

document.getElementById('postForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    alert('حط SUPABASE_URL و SUPABASE_KEY بتوعك في الكود الأول وبعدين هتشتغل الإضافة');
});

function resetForm() {
    document.getElementById('postForm').reset();
    document.getElementById('imagePreview').style.display = 'none';
}
</script>
</body>
</html>
