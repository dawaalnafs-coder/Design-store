<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم M&D</title>
<style>
body { font-family: 'Tajawal', sans-serif; background:#f5f5f5; padding:30px; }
.container { max-width:600px; margin:auto; background:white; padding:30px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.1) }
input, textarea { width:100%; padding:12px; margin:10px 0; border:2px solid #ddd; border-radius:8px; font-size:16px; box-sizing:border-box }
button { background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; border:none; padding:15px 30px; border-radius:8px; font-size:18px; cursor:pointer; width:100% }
button:hover { opacity:0.9 }
.msg { padding:15px; border-radius:8px; margin:15px 0; display:none; text-align:center }
.success { background:#d4edda; color:#155724 }
.error { background:#f8d7da; color:#721c24 }
</style>
</head>
<body>
<div class="container">
  <h2 style="text-align:center; color:#667eea">👑 لوحة تحكم M&D</h2>
  
  <input type="password" id="pass" placeholder="كلمة السر">
  
  <input type="text" id="title" placeholder="عنوان المنشور">
  <textarea id="desc" rows="5" placeholder="وصف المنشور"></textarea>
  <input type="url" id="img" placeholder="رابط الصورة - اختياري">
  
  <label style="display:block; margin:15px 0; text-align:center">
    <input type="checkbox" id="pub" checked> نشر مباشرة
  </label>
  
  <button onclick="addPost()">نشر المنشور</button>
  
  <div id="msg" class="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</script>
</body>
</html>
