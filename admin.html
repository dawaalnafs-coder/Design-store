<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم - دواء النفس</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Tajawal,Arial;background:#0f172a;color:#e2e8f0;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:15px}
input,textarea{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0}
button{background:#3b82f6;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer}
.post{border:1px solid #334155;padding:12px;margin:10px 0;border-radius:8px}
</style>
</head>
<body>
<h1>لوحة تحكم دواء النفس</h1>

<div class="card">
<h3>إضافة منشور جديد</h3>
<input id="title" placeholder="عنوان المنشور">
<textarea id="content" placeholder="محتوى المنشور" rows="4"></textarea>
<button onclick="addPost()">نشر</button>
</div>

<div class="card">
<h3>المنشورات</h3>
<div id="postsList">جاري التحميل...</div>
</div>

<script>
alert('لو شفتني يبقى السكريبت شغال 100%');

const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadPosts(){
    const { data, error } = await supabaseClient.from('posts').select('*').order('created_at', {ascending: false});
    const list = document.getElementById('postsList');
    if(error){ list.innerHTML = 'خطأ: ' + error.message; return; }
    if(!data || data.length === 0){ list.innerHTML = 'لا توجد منشورات بعد'; return; }
    list.innerHTML = data.map(p => `<div class="post"><b>${p.title}</b><br>${p.content}</div>`).join('');
}

async function addPost(){
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    if(!title || !content){ alert('اكتب العنوان والمحتوى'); return; }
    const { error } = await supabaseClient.from('posts').insert([{title, content}]);
    if(error){ alert('خطأ: ' + error.message); return; }
    alert('تم النشر');
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';
    loadPosts();
}

loadPosts();
</script>
</body>
</html>
