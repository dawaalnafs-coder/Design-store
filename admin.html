<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم M&D</title>
<style>
body { font-family: sans-serif; background:#f5f5f5; padding:30px }
.container { max-width:600px; margin:auto; background:white; padding:30px; border-radius:15px }
input, textarea { width:100%; padding:12px; margin:10px 0; border:2px solid #ddd; border-radius:8px; font-size:16px; box-sizing:border-box }
button { background:#667eea; color:white; border:none; padding:15px; border-radius:8px; font-size:18px; cursor:pointer; width:100% }
</style>
</head>
<body>
<div class="container">
  <h2 style="text-align:center; color:#667eea">لوحة تحكم M&D 👑</h2>
  
  <input type="password" id="pass" placeholder="كلمة السر: md123">
  <input type="text" id="title" placeholder="عنوان المنشور">
  <textarea id="desc" rows="5" placeholder="وصف المنشور"></textarea>
  <input type="url" id="img" placeholder="رابط الصورة">
  
  <label><input type="checkbox" id="pub" checked> نشر مباشرة</label>
  
  <button type="button" onclick="alert('الزر شغال! كلمة السر: ' + document.getElementById('pass').value)">نشر المنشور</button>
</div>
</body>
</html>
