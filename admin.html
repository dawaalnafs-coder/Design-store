<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم النفس</title>
<style>
body{font-family:tahoma;background:#f5f5f5;padding:20px}
.container{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:8px}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:4px;font-size:16px}
.btn-save{background:#28a745;color:#fff;border:none;padding:12px 20px;border-radius:4px;cursor:pointer;margin-left:10px}
.btn-save:hover{background:#218838}
.btn-delete{background:#dc3545;color:#fff;border:none;padding:8px 12px;border-radius:4px;cursor:pointer;margin-right:5px}
.btn-edit{background:#007bff;color:#fff;border:none;padding:8px 12px;border-radius:4px;cursor:pointer;margin-right:5px}
#msg{margin:10px 0;padding:10px;border-radius:4px;display:none}
.post-item{background:#f8f9fa;padding:10px;margin:10px 0;border-radius:4px;border-right:4px solid #007bff}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
<h2>📝 لوحة تحكم الموقع</h2>

<div id="msg"></div>

<form onsubmit="return false">
<input type="hidden" id="postId">
<input type="text" id="title" placeholder="عنوان المقال" required>
<textarea id="content" placeholder="محتوى المقال" rows="5" required></textarea>
<input type="text" id="image" placeholder="رابط الصورة">
<button type="submit" class="btn-save" onclick="savePost()">💾 حفظ / تعديل</button>
<button type="button" onclick="clearForm()">🆕 جديد</button>
</form>

<hr>
<h3>📚 المقالات الموجودة</h3>
<div id="postsList">جاري التحميل...</div>
</div>

<script>
// 1. حط بياناتك هنا - مهم جداً
const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co' // ← حط الرابط بتاعك
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk'       

// 2. انشاء الاتصال
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// 3. جلب العناصر مرة واحدة
const title = document.getElementById('title')
const content = document.getElementById('content')
const image = document.getElementById('image')
const postId = document.getElementById('postId')
const msg = document.getElementById('msg')
const postsList = document.getElementById('postsList')

// 4. رسائل التنبيه
function showMsg(text, type){
msg.style.display = 'block'
msg.innerText = text
msg.style.background = type=='error'? '#f8d7da' : '#d4edda'
msg.style.color = type=='error'? '#721c24' : '#155724'
setTimeout(()=>{msg.style.display='none'}, 3000)
}

// 5. عرض المقالات - R من CRUD
async function loadPosts(){
const {data, error} = await supabaseClient.from('posts').select('*').order('id', {ascending: false})

if(error){
postsList.innerHTML = 'خطأ في التحميل: ' + error.message
showMsg('خطأ في الاتصال', 'error')
return
}

if(data.length==0){
postsList.innerHTML = 'لا يوجد مقالات'
return
}

postsList.innerHTML = data.map(p=>`
<div class="post-item">
<b>${p.id}. ${p.title}</b><br>
<small>${p.content.substring(0,50)}...</small><br>
<button class="btn-edit" onclick="editPost(${p.id},'${p.title.replace(/'/g,"\\'")}','${p.content.replace(/'/g,"\\'")}','${p.image||''}')">✏️ تعديل</button>
<button class="btn-delete" onclick="deletePost(${p.id})">🗑️ حذف</button>
</div>
`).join('')
}

// 6. الحفظ والتعديل - C و U من CRUD
async function savePost(){
if(!title.value ||!content.value){
showMsg('اكتب العنوان والمحتوى', 'error')
return
}

let data = {title:title.value, content:content.value, image:image.value}

if(postId.value){
// تعديل مقال موجود
const {error} = await supabaseClient.from('posts').update(data).eq('id', postId.value)
if(error){showMsg('خطأ في التعديل', 'error'); return}
showMsg('✅ تم التعديل', 'success')
postId.value = ''
}else{
// اضافة مقال جديد
const {error} = await supabaseClient.from('posts').insert([data])
if(error){showMsg('خطأ في النشر', 'error'); return}
showMsg('✅ تم النشر', 'success')
}

clearForm()
loadPosts()
}

// 7. التعديل - نعبي الفورم
function editPost(id, t, c, i){
postId.value = id
title.value = t
content.value = c
image.value = i
window.scrollTo(0,0)
showMsg('جاري تعديل مقال رقم ' + id, 'success')
}

// 8. الحذف - D من CRUD
async function deletePost(id){
if(!confirm('متأكد عايز تحذف المقال رقم ' + id + '؟')) return

const {error} = await supabaseClient.from('posts').delete().eq('id', id)
if(error){showMsg('خطأ في الحذف', 'error'); return}
showMsg('🗑️ تم الحذف', 'success')
loadPosts()
}

// 9. تفريغ الفورم
function clearForm(){
postId.value = ''
title.value = content.value = image.value = ''
}

// 10. اول ما الصفحة تفتح
loadPosts()
</script>
</body>
</html>
