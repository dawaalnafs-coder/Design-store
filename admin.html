<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة إضافة المنشورات</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Tahana;background:#f4f4f4;padding:20px}
.box{background:white;padding:20px;border-radius:10px;max-width:500px;margin:auto}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:5px}
button{background:#28a745;color:white;border:none;padding:12px;width:100%;border-radius:5px;cursor:pointer;font-size:16px}
button:hover{background:#218838}
#msg{margin-top:10px;font-weight:bold;text-align:center}
</style>
</head>
<body>
<div class="box">
<h2>إضافة منشور جديد</h2>
<input id="title" placeholder="عنوان المنشور">
<input id="image" placeholder="رابط الصورة المباشر من postimg.cc">
<textarea id="desc" placeholder="وصف المنشور" rows="4"></textarea>
<button onclick="addPost()">حفظ في الموقع</button>
<div id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk'
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function addPost(){
  const title = document.getElementById('title').value
  const image_url = document.getElementById('image').value
  const description = document.getElementById('desc').value
  const msg = document.getElementById('msg')
  
  if(!title || !image_url || !description){
    msg.innerText = 'املأ كل الحقول'
    msg.style.color = 'red'
    return
  }
  
  const { error } = await supabase.from('posts').insert([{title, image_url, description}])
  
  if(error){
    msg.innerText = 'خطأ: ' + error.message
    msg.style.color = 'red'
  } else {
    msg.innerText = 'تم الحفظ بنجاح! ✅'
    msg.style.color = 'green'
    document.getElementById('title').value = ''
    document.getElementById('image').value = ''
    document.getElementById('desc').value = ''
  }
}
</script>
</body>
</html>
