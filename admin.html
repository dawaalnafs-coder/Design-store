<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - مدونتي</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:'Tajawal',sans-serif;background:#f5f7fa;margin:0;padding:20px}
.container{max-width:900px;margin:0 auto;background:white;padding:30px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
h1{color:#2c3e50;text-align:center;margin-bottom:30px}
input,textarea,select{width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:8px;font-size:16px;font-family:inherit}
textarea{min-height:200px;resize:vertical}
button{background:#3498db;color:white;border:none;padding:14px 25px;border-radius:8px;cursor:pointer;font-size:16px;font-weight:bold;margin:5px}
button:hover{background:#2980b9}
button.danger{background:#e74c3c}
button.danger:hover{background:#c0392b}
table{width:100%;border-collapse:collapse;margin-top:30px}
th,td{padding:12px;text-align:right;border-bottom:1px solid #ddd}
th{background:#3498db;color:white}
tr:hover{background:#f8f9fa}
img.preview{max-width:100px;max-height:70px;border-radius:5px}
.status{padding:5px 10px;border-radius:5px;font-size:13px}
.status.published{background:#2ecc71;color:white}
.status.draft{background:#95a5a6;color:white}
#loginScreen{text-align:center;padding:100px 20px}
</style>
</head>
<body>
<div id="loginScreen">
<h1>🔐 لوحة تحكم المدونة</h1>
<p>ادخل كلمة السر للمتابعة</p>
</div>

<div id="adminPanel" style="display:none">
<div class="container">
<h1>📝 إدارة البوستات</h1>
<form id="postForm">
<h3 id="formTitle">إضافة بوست جديد</h3>
<input type="hidden" id="postId">
<input type="text" id="title" placeholder="عنوان البوست" required>
<textarea id="content" placeholder="اكتب محتوى البوست هنا..." required></textarea>
<label>📸 صورة الغلاف:</label>
<input type="file" id="imageFile" accept="image/*">
<img id="imagePreview" class="preview" style="display:none;margin-top:10px">
<input type="hidden" id="imageUrl">
<br>
<label><input type="checkbox" id="published"> نشر البوست الآن</label>
<br><br>
<button type="submit">💾 حفظ البوست</button>
<button type="button" onclick="resetForm()">➕ بوست جديد</button>
</form>

<h3 style="margin-top:50px">📋 كل البوستات</h3>
<table>
<thead>
<tr>
<th>العنوان</th>
<th>الصورة</th>
<th>الحالة</th>
<th>التاريخ</th>
<th>إجراءات</th>
</tr>
</thead>
<tbody id="postsTable">
<tr><td colspan="5">جاري التحميل...</td></tr>
</tbody>
</table>
</div>
</div>
<script>
const PASSWORD = 'mysecret1999';
const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let pass = prompt("Enter password:");
if(pass!== PASSWORD) {
    alert("كلمة السر خاطئة!");
    document.body.innerHTML = "<h1 style='text-align:center;margin-top:100px'>Access Denied</h1>";
} else {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadPosts();
}

document.getElementById('imageFile').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById('imagePreview').src = URL.createObjectURL(file);
    document.getElementById('imagePreview').style.display = 'block';
});

document.getElementById('postForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('postId').value;
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    const published = document.getElementById('published').checked;
    const file = document.getElementById('imageFile').files[0];

    let imageUrl = document.getElementById('imageUrl').value;

    if(file) {
        const fileName = Date.now() + '_' + file.name;
        const {data, error} = await supabase.storage.from('images').upload(fileName, file);
        if(error) { alert('خطأ في رفع الصورة: ' + error.message); return; }
        imageUrl = SUPABASE_URL + '/storage/v1/object/public/images/' + fileName;
    }

    const postData = {title, content, image_url: imageUrl, published};

    if(id) {
        await supabase.from('posts').update(postData).eq('id', id);
        alert('تم التحديث!');
    } else {
        await supabase.from('posts').insert([postData]);
        alert('تمت الإضافة!');
    }
    resetForm();
    loadPosts();
});

async function loadPosts() {
    const {data} = await supabase.from('posts').select('*').order('created_at', {ascending:false});
    const tbody = document.getElementById('postsTable');
    if(!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5">لا توجد بوستات بعد</td></tr>';
        return;
    }
    tbody.innerHTML = data.map(p => `
        <tr>
            <td>${p.title}</td>
            <td>${p.image_url? `<img src="${p.image_url}" class="preview">` : '-'}</td>
            <td><span class="status ${p.published? 'published' : 'draft'}">${p.published? 'منشور' : 'مسودة'}</span></td>
            <td>${new Date(p.created_at).toLocaleDateString('ar-EG')}</td>
            <td>
                <button onclick='editPost(${JSON.stringify(p)})'>تعديل</button>
                <button class="danger" onclick="deletePost(${p.id})">حذف</button>
            </td>
        </tr>
    `).join('');
}

function editPost(p) {
    document.getElementById('postId').value = p.id;
    document.getElementById('title').value = p.title;
    document.getElementById('content').value = p.content;
    document.getElementById('imageUrl').value = p.image_url || '';
    document.getElementById('published').checked = p.published;
    if(p.image_url) {
        document.getElementById('imagePreview').src = p.image_url;
        document.getElementById('imagePreview').style.display = 'block';
    }
    document.getElementById('formTitle').innerText = 'تعديل البوست';
    window.scrollTo(0,0);
}

async function deletePost(id) {
    if(confirm('متأكد عايز تحذف؟')) {
        await supabase.from('posts').delete().eq('id', id);
        loadPosts();
    }
}

function resetForm() {
    document.getElementById('postForm').reset();
    document.getElementById('postId').value = '';
    document.getElementById('imageUrl').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('formTitle').innerText = 'إضافة بوست جديد';
}
</script>
</body>
</html>
