<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>
<style>
body{font-family:Tahoma;padding:20px;background:#f5f5f5}
input,textarea{width:100%;padding:8px;margin:5px 0;border:1px solid #ccc;border-radius:5px}
button{padding:8px 15px;border:none;border-radius:5px;cursor:pointer;margin:2px}
.btn-save{background:#28a745;color:white}
.btn-edit{background:#ffc107}
.btn-delete{background:#dc3545;color:white}
.post{background:white;padding:10px;margin:10px 0;border-radius:5px}
#msg{margin:10px 0;font-weight:bold}
</style>
</head>
<body>

<h2>📝 لوحة تحكم المقالات</h2>

<div id="msg"></div>

<form onsubmit="event.preventDefault(); savePost()">
  <!-- الدرج المخفي بتاعنا -->
  <input type="hidden" id="postId">

  <input type="text" id="title" placeholder="عنوان المقال" required>
  <textarea id="content" placeholder="محتوى المقال" rows="5" required></textarea>
  <input type="text" id="image" placeholder="رابط الصورة">

  <button type="submit" class="btn-save">💾 حفظ / تعديل</button>
  <button type="button" onclick="clearForm()">🆕 جديد</button>
</form>

<hr>
<h3>📚 المقالات الموجودة</h3>
<div id="postsList">جاري التحميل...</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 1. ربط Supabase - حط بياناتك هنا
const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk'
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// 2. نجيب العناصر مرة واحدة
const title = document.getElementById('title')
const content = document.getElementById('content')
const image = document.getElementById('image')
const postId = document.getElementById('postId')
const msg = document.getElementById('msg')

// 3. رسائل التنبيه
function showMsg(text, type){
  msg.innerText = text
  msg.style.color = type=='error'? 'red' : 'green'
  setTimeout(()=>msg.innerText='', 3000)
}

// 4. عرض المقالات - R من CRUD
async function loadPosts(){
  const {data, error} = await db.from('posts').select('*').order('id', {ascending:false})
  if(error){ postsList.innerText='خطأ في التحميل'; return }

  if(data.length==0){ postsList.innerText='لا يوجد مقالات'; return }

  postsList.innerHTML = data.map(p=>`
    <div class="post">
      <b>${p.id}. ${p.title}</b><br>
      <small>${p.content.substring(0,50)}...</small><br>
      <button class="btn-edit" onclick="editPost(${p.id},'${p.title}','${p.content}','${p.image||''}')">✏️ تعديل</button>
      <button class="btn-delete" onclick="deletePost(${p.id})">🗑️ حذف</button>
    </div>
  `).join('')
}

// 5. الحفظ والتعديل - C و U من CRUD
async function savePost(){
  if(!title.value ||!content.value){
    showMsg('اكتب العنوان والمحتوى', 'error')
    return
  }

  let data = {title:title.value, content:content.value, image:image.value}

  if(postId.value){ // لو فيه رقم في الدرج المخفي = تعديل
    await db.from('posts').update(data).eq('id', postId.value)
    showMsg('✅ تم التعديل', 'success')
    postId.value = '' // فضي الدرج
  } else { // الدرج فاضي = نشر جديد
    await db.from('posts').insert([data])
    showMsg('✅ تم النشر', 'success')
  }

  clearForm()
  loadPosts() // حدث القايمة
}

// 6. التعديل - بنملى الفورم ونحط الرقم في الدرج المخفي
function editPost(id, t, c, i){
  postId.value = id // حط الرقم في الدرج
  title.value = t
  content.value = c
  image.value = i
  window.scrollTo(0,0) // اطلع فوق للفورم
  showMsg('✏️ جاري التعديل على مقال رقم '+id, 'success')
}

// 7. الحذف - D من CRUD
async function deletePost(id){
  if(!confirm('متأكد عايز تحذف المقال رقم '+id+'؟')) return

  await db.from('posts').delete().eq('id', postId.value || id)
  showMsg('🗑️ تم الحذف', 'success')
  loadPosts()
}

// 8. تفريغ الفورم للجديد
function clearForm(){
  postId.value = ''
  title.value = content.value = image.value = ''
}

// 9. أول ما الصفحة تفتح اعرض المقالات
loadPosts()
</script>
</body>
</html>
