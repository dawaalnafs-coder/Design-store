<!DOCTYPE html>

<title>لوحة الأدمن</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Tajawal;background:#f5f7fa;padding:20px}
.card{background:white;padding:15px;margin:10px 0;border-radius:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
button{background:#e74c3c;color:white;border:none;padding:8px 15px;border-radius:6px;cursor:pointer}
h2{color:#667eea}
</style>
</head>
<body>
<h2>🔐 لوحة الأدمن - البلاغات</h2>
<div id="list">سجل دخول من index.html الأول...</div>

<script>
const db = supabase.createClient('https://pbadwhwdodhwutuzjwuz.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk');

// يتأكد إنك أدمن قبل ما يعرض البلاغات
db.auth.getSession().then(({data}) => {
  if(!data.session || data.session.user.email !== 'dawaahafs@gmail.com') {
    document.getElementById('list').innerHTML = '❌ دي للأدمن بس. سجل دخول بإيميل الأدمن من الصفحة الرئيسية';
    return;
  }
  loadReports();
});

async function loadReports() {
  const { data } = await db.from('reports').select('*, posts(*)').order('created_at', {ascending:false});
  if(!data || data.length === 0) return document.getElementById('list').innerHTML = '✅ مفيش بلاغات حالياً';
  
  document.getElementById('list').innerHTML = data.map(r => `
    <div class="card">
      <b>العنوان:</b> ${r.posts.title}<br>
      <b>الكاتب:</b> ${r.posts.author}<br>
      <b>المحتوى:</b> ${r.posts.content.substring(0,100)}...<br>
      <b>وقت البلاغ:</b> ${new Date(r.created_at).toLocaleString('ar-EG')}<br>
      <button onclick="deletePost(${r.post_id})">🗑️ احذف البوست</button>
    </div>
  `).join('');
}

async function deletePost(id) {
  if(!confirm('متأكد؟ الحذف نهائي')) return;
  await db.from('posts').delete().eq('id', id);
  await db.from('reports').delete().eq('post_id', id);
  loadReports();
}
</script>
</body>
</html>
