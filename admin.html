<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم M&D</title>
<style>
body { font-family: sans-serif; background:#f5f5f5; padding:30px }
.container { max-width:600px; margin:auto; background:white; padding:30px; border-radius:15px }
input, textarea { width:100%; padding:12px; margin:10px 0; border:2px solid #ddd; border-radius:8px; font-size:16px; box-sizing:border-box }
button { background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; border:none; padding:15px; border-radius:8px; font-size:18px; cursor:pointer; width:100% }
.msg { padding:15px; border-radius:8px; margin:15px 0; display:none; text-align:center; font-weight:bold }
.success { background:#d4edda; color:#155724 }
.error { background:#f8d7da; color:#721c24 }
</style>
</head>
<body>
<div class="container">
  <h2 style="text-align:center; color:#667eea">👑 لوحة تحكم M&D</h2>
  
  <input type="password" id="pass" placeholder="كلمة السر">
  <input type="text" id="title" placeholder="عنوان المنشور">
  <textarea id="desc" rows="5" placeholder="وصف المنشور"></textarea>
  <input type="url" id="img" placeholder="رابط الصورة - اختياري">
  
  <label style="display:block; margin:15px 0; text-align:center">
    <input type="checkbox" id="pub" checked> نشر مباشرة
  </label>
  
  <button type="button" onclick="addPost()">نشر المنشور</button>
  
  <div id="msg" class="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  'https://pbadwhwdodhwutuzjwuz.supabase.co',
  'sb_publishable_MRspQIqKOrUDJF_HxKHnoQ_J3Sfvz1w'
)

function showMsg(text, type) {
  const m = document.getElementById('msg')
  m.className = 'msg ' + type
  m.innerText = text
  m.style.display = 'block'
  setTimeout(() => m.style.display = 'none', 4000)
}

async function addPost() {
  const pass = document.getElementById('pass').value
  if(pass !== 'md123') {
    showMsg('كلمة السر غلط! اكتب md123', 'error')
    return
  }
  
  const title = document.getElementById('title').value
  const desc = document.getElementById('desc').value
  const img = document.getElementById('img').value
  const pub = document.getElementById('pub').checked
  
  if(!title || !desc) {
    showMsg('اكتب العنوان والوصف', 'error')
    return
  }
  
  showMsg('جاري النشر...', 'success')
  
  const { error } = await supabase.from('posts').insert([{
    title: title,
    description: desc,
    image_url: img,
    published: pub
  }])
  
  if(error) {
    showMsg('خطأ: ' + error.message, 'error')
  } else {
    showMsg('تم النشر بنجاح! ✅ روح الموقع وشوفه', 'success')
    document.getElementById('title').value = ''
    document.getElementById('desc').value = ''
    document.getElementById('img').value = ''
  }
}
</script>
</body>
</html>
