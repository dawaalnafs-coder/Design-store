<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head><meta charset="UTF-8"><title>نشر</title></head>
<body style="padding:20px;font-family:tahoma">
<h3>نشر منشور جديد</h3>
<input type="password" id="p" placeholder="كلمة السر: md123" style="width:100%;padding:10px"><br><br>
<input type="text" id="t" placeholder="العنوان" style="width:100%;padding:10px"><br><br>
<textarea id="d" placeholder="الوصف" style="width:100%;padding:10px;height:100px"></textarea><br><br>
<button onclick="go()" style="width:100%;padding:15px;background:green;color:white">نشر الآن</button>
<p id="msg"></p>

<script>
const URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co'
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk'

async function go(){
  if(document.getElementById('p').value!= 'md123'){
    document.getElementById('msg').innerText = '❌ كلمة السر غلط'
    return
  }

  document.getElementById('msg').innerText = 'جاري النشر...'

  const res = await fetch(URL + '/rest/v1/posts', {
    method: 'POST',
    headers: {
      'apikey': KEY,
      'Authorization': 'Bearer ' + KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({
      title: document.getElementById('t').value,
      description: document.getElementById('d').value,
      published: true
    })
  })

  const data = await res.json()

  if(res.ok){
    document.getElementById('msg').innerText = '✅ تم النشر بنجاح! ID: ' + data[0].id
    document.getElementById('t').value = ''
    document.getElementById('d').value = ''
  } else {
    document.getElementById('msg').innerText = '❌ خطأ: ' + JSON.stringify(data)
  }
}
</script>
</body>
</html>
