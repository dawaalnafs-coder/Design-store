<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم - نشر منشور</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Tajawal', sans-serif; background: #f5f5f5; padding: 40px; }
    .box { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { color: #2c3e50; text-align: center; }
    input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
    button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
    button:hover { background: #219a52; }
    #msg { text-align: center; margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="box">
    <h2>📝 نشر منشور جديد</h2>
    
    <input type="text" id="title" placeholder="عنوان المنشور">
    <textarea id="desc" rows="5" placeholder="اكتب الوصف هنا..."></textarea>
    <input type="text" id="img" placeholder="رابط الصورة - اختياري">
    
    <button onclick="publish()">نشر الآن</button>
    <p id="msg"></p>
    
    <br><a href="index.html">← الرجوع للمدونة</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://pbadwhwdodhwutuzjwuz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiYWR3aHdkb2Rod3V0dXpqd3V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDEzOTYsImV4cCI6MjA5NTcxNzM5Nn0.WVtppUQRzy6Fk0KyAlEosP8OBqNPdFPfCQMN0zvDWTk'; // حط المفتاح الطويل حقك هنا
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function publish() {
      const title = document.getElementById('title').value;
      const desc = document.getElementById('desc').value;
      const img = document.getElementById('img').value;
      const msg = document.getElementById('msg');
      
      if (!title || !desc) {
        msg.innerHTML = '⚠️ العنوان والوصف مطلوبين';
        msg.style.color = 'red';
        return;
      }

      msg.innerHTML = 'جاري النشر...';
      msg.style.color = 'blue';

      const { error } = await supabase
        .from('posts')
        .insert([{ title: title, description: desc, image_url: img }]);

      if (error) {
        msg.innerHTML = '❌ خطأ: ' + error.message;
        msg.style.color = 'red';
      } else {
        msg.innerHTML = '✅ تم النشر بنجاح! <a href="index.html">شاهد المدونة</a>';
        msg.style.color = 'green';
        document.getElementById('title').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('img').value = '';
      }
    }
  </script>
</body>
</html>
