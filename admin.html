<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة النشر</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family:Tajawal; background:#f5f5f5; padding:40px; text-align:right;">
<div style="max-width:600px; margin:auto; background:white; padding:30px; border-radius:15px;">
<h2>✍️ انشر منشور جديد</h2>

<input type="text" id="title" placeholder="عنوان المنشور" style="width:100%; padding:12px; margin:10px 0;">
<textarea id="desc" rows="5" placeholder="اكتب الوصف..." style="width:100%; padding:12px; margin:10px 0;"></textarea>
<input type="text" id="img" placeholder="رابط الصورة" style="width:100%; padding:12px; margin:10px 0;">

<button onclick="testBtn()" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:8px; font-size:18px;">نشر الآن</button>
<p id="msg" style="text-align:center; margin-top:15px; font-weight:bold;"></p>
<br><a href="index.html">← الرجوع للمدونة</a>
</div>

<script>
// 1. اول شي نتأكد الزر شغال
function testBtn() {
  alert('الزر شغال الحين! بنربط Supabase بعدين');
  publish();
}

// 2. بعدين نربط Supabase
const SUPABASE_URL = 'https://pbadhwwhodwutuzwjuz.supabase.co';
const SUPABASE_KEY = 'الصق_مفتاح_anon_هنا_كامل';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function publish() {
  const title = document.getElementById('title').value;
  const desc = document.getElementById('desc').value;
  const img = document.getElementById('img').value;
  const msg = document.getElementById('msg');

  if (!title || !desc) {
    msg.innerHTML = '⚠️ اكتب العنوان والوصف اول';
    msg.style.color = 'red';
    return;
  }

  msg.innerHTML = '⏳ جاري النشر...';
  msg.style.color = 'blue';

  const { data, error } = await supabase
    .from('posts')
    .insert([{ title: title, content: desc, image_url: img }])
    .select();

  if (error) {
    msg.innerHTML = '❌ خطأ: ' + error.message;
    msg.style.color = 'red';
  } else {
    msg.innerHTML = '✅ تم النشر بنجاح! <a href="index.html">شوف المدونة</a>';
    msg.style.color = 'green';
  }
}
</script>
</body>
</html>
